<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#0a0a0a"/>
  <!-- Spa/lotus flower - salón de belleza -->
  <g transform="translate(64,68)">
    <!-- Center petal -->
    <ellipse cx="0" cy="-20" rx="10" ry="24" fill="#d946ef"/>
    <!-- Left petal -->
    <ellipse cx="-22" cy="-8" rx="10" ry="22" fill="#d946ef" transform="rotate(30 -22 -8)"/>
    <!-- Right petal -->
    <ellipse cx="22" cy="-8" rx="10" ry="22" fill="#d946ef" transform="rotate(-30 22 -8)"/>
    <!-- Far left petal -->
    <ellipse cx="-34" cy="8" rx="8" ry="18" fill="#d946ef" opacity="0.8" transform="rotate(55 -34 8)"/>
    <!-- Far right petal -->
    <ellipse cx="34" cy="8" rx="8" ry="18" fill="#d946ef" opacity="0.8" transform="rotate(-55 34 8)"/>
    <!-- Stem -->
    <line x1="0" y1="6" x2="0" y2="32" stroke="#d946ef" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
